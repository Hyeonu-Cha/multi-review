name: ci

# Runs the engine's syntax check and smoke tests on every PR and on pushes to main.
# This is the automated merge gate. Needs only bash + jq + git — all present on
# ubuntu-latest — because tests/run.sh drives a fake reviewer CLI and a fake gh
# (no real AI CLI or network).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify jq is available
        run: jq --version
      - name: Shell syntax check
        run: |
          bash -n bin/multi-review
          bash -n tests/run.sh
          bash -n bench/run.sh
      - name: ShellCheck
        # --severity=warning gates on real bugs (unquoted/undefined vars, bad tests)
        # without churning on intentional style notes — e.g. SC2016 fires on the
        # single-quoted jq filters, which MUST NOT be shell-expanded. shellcheck is
        # preinstalled on ubuntu-latest runners.
        run: shellcheck --severity=warning bin/multi-review tests/run.sh bench/run.sh
      - name: Smoke tests
        run: bash tests/run.sh

  # Validates the plugin packaging so a broken manifest can't reach a publish.
  # The jq checks are the hard gate (offline, deterministic); the official
  # `claude plugin validate` runs as a best-effort cross-check (it pulls the CLI
  # over the network, so it must not be able to block the build by itself).
  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Manifest structural check (jq)
        run: |
          set -e
          echo "› .claude-plugin/plugin.json"
          jq -e '
            (.name|type=="string" and (test("^[a-z0-9][a-z0-9-]*$")))
            and (.version|type=="string")
            and (.description|type=="string")
            and (.author.name|type=="string")
            and (.license|type=="string")
            and (.keywords|type=="array")
          ' .claude-plugin/plugin.json >/dev/null
          echo "› .claude-plugin/marketplace.json"
          jq -e '
            (.name|type=="string")
            and (.owner.name|type=="string")
            and (.plugins|type=="array" and length>0)
            and (all(.plugins[]; (.name|type=="string") and (.source|type=="string")))
          ' .claude-plugin/marketplace.json >/dev/null
          echo "› SKILL.md frontmatter present"
          head -1 skills/multi-review/SKILL.md | grep -qx -- '---'
      - name: Official plugin validate (best-effort)
        continue-on-error: true
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate . --strict
